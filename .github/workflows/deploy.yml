name: Auto-inject version & deploy

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'sw.js'

jobs:
  inject-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Inject build version vào sw.js và index.html
        run: |
          VERSION="pivo-$(date -u +%Y%m%d-%H%M)"
          echo "VERSION=$VERSION"
          sed -i "s/const CACHE_VERSION = '[^']*'/const CACHE_VERSION = '$VERSION'/" sw.js
          sed -i "s/const APP_VERSION = \"[^\"]*\"/const APP_VERSION = \"$VERSION\"/" index.html

      - name: Commit version đã inject
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sw.js index.html
          git diff --cached --quiet || git commit -m "chore: auto-inject version $(date -u +%Y%m%d-%H%M)"
          git push
